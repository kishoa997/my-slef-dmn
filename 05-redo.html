<!DOCTYPE html>
<head>
  <link rel="stylesheet" href="05-redo.css">
</head>  
  <title>
    paper scissor stone 3.0
  </title>

  <body style="background-color: black;
                color: white;">

  <div class="emoji">
   <div class="paper-icon"       onclick="play('paper')">
    🖐🏽</div>
    <div class="scissors-icon"   onclick="play('scissors')">
    ✌🏽</div>
    <div class="rock-icon"       onclick="play('rock')">
    ✊🏽</div>
  </div>
<div class="buttons">
  <button class="paper"
    onclick="play('paper')"     > paper</button>

  

   <button class="scissors" 
    onclick="play('scissors')"  > scissors </button>

  

    <button class="rock"
    onclick="play('rock')"    > rock</button> 


    
    
    <button class="score" 
    onclick="showScore()"     > score</button>


    <button class="reset"
    onclick="score.win=0; score.lose=0; score.tie=0; document.getElementById('showscore').textContent='Score reset!';"     > 
      reset</button>
    
    </div>
    
    <div id="result"></div>
    <div id="showscore"></div>
    
    <script>
     
    let computerMove =  '';
        let score = {
          win:0,
          lose:0,
          tie:0 
        };
      function pick() {
      const randomnumber = Math.random();
      if (randomnumber <1/3) computerMove = 'paper';
      else if (randomnumber < 2/3 && randomnumber >= 1/3) computerMove = 'scissors';
      else computerMove = 'rock';
              
}

      function play(playerMove) {
        pick();
        let result;
      if (playerMove === computerMove){result = 'tie';}
        else if ((playerMove ==='paper' && computerMove === 'rock') ||
                (playerMove === 'scissors'&& computerMove === 'paper') || 
                (playerMove === 'rock' && computerMove === 'scissors') ) {result = 'win!';}
        else {result = 'lose!';}
        document.getElementById('result').textContent = `You choose ${playerMove} and computer choose ${computerMove}----> Result: ${result}!`;
       
        if(result === 'win!'){score.win += 1;}
        else if (result === 'lose!'){score.lose +=1;}
        else if (result === 'tie'){score.tie +=1;}
      }
      function showScore(){
          document.getElementById('showscore').textContent= `win:${score.win} lose:${score.lose} tie:${score.tie}`;
        
      }
    </script>
  </body>
